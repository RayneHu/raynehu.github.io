                    <h3 class="font-bold opacity-80">${t.propTitle}</h3>
                    <button onclick="closePropertyPanel()" class="hover:opacity-60"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                <div class="flex-1 overflow-y-auto p-5 space-y-5 hide-scroll text-sm">
                    <div><label class="block text-xs font-medium opacity-60 mb-1">${t.name}</label><input type="text" value="${item.desc || ''}" oninput="updateItemField('desc', this.value)" class="custom-input"></div>
                    <div><label class="block text-xs font-medium opacity-60 mb-2">${t.tag}</label><div class="grid grid-cols-8 gap-2">${colorOptions}</div></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-xs font-medium opacity-60 mb-1">${t.size}</label><input type="text" value="${item.dimensions || ''}" oninput="updateItemField('dimensions', this.value)" class="custom-input"></div>
                        <div><label class="block text-xs font-medium opacity-60 mb-1">${t.mat}</label><input type="text" value="${item.material || ''}" oninput="updateItemField('material', this.value)" class="custom-input"></div>
                        <div><label class="block text-xs font-medium opacity-60 mb-1">${t.price}</label><input type="text" value="${item.price || ''}" oninput="updateItemField('price', this.value)" class="custom-input"></div>
                        <div><label class="block text-xs font-medium opacity-60 mb-1">${t.brand}</label><input type="text" value="${item.brand || ''}" oninput="updateItemField('brand', this.value)" class="custom-input"></div>
                    </div>
                    <div><label class="block text-xs font-medium opacity-60 mb-1">${t.note}</label><textarea oninput="updateItemField('note', this.value)" class="custom-input h-20 resize-none">${item.note || ''}</textarea></div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs font-medium opacity-60">${t.ref} (${(item.images || []).length})</label>
                            <label class="text-xs text-blue-500 hover:text-blue-600 cursor-pointer font-medium">+ Add<input type="file" multiple class="hidden" accept="image/*" onchange="uploadItemImages(event)"></label>
                        </div>
                        <div class="grid grid-cols-3 gap-2">${imagesHTML}</div>
                    </div>
                </div>
                <div class="p-4 border-t flex gap-2 shrink-0" style="border-color: var(--theme-border);">
                    <button onclick="syncSimilarItems()" class="flex-1 py-2 rounded text-xs transition border text-blue-600 bg-blue-50 hover:bg-blue-100 border-blue-100" title="同步属性给所有页面的同名点位">${t.sync}</button>
                    <button onclick="duplicatePin()" class="flex-1 py-2 rounded text-xs transition border" style="border-color: var(--theme-border);">${t.dup}</button>
                    <button onclick="deleteSelectedPin()" class="flex-1 py-2 rounded text-xs text-red-600 bg-red-50 hover:bg-red-100 transition border border-red-100">${t.del}</button>
                </div>
            `;
        }

        function closePropertyPanel() { document.getElementById('propertyPanel').classList.add('translate-x-full'); selectedItemId = null; renderPins(); }
        
        function addPage() { 
            appData.pages.splice(appData.pages.length - 1, 0, { id: generateId(), type: 'plan', title: '', bgImage: null, items: [] }); 
            currentPageIndex = appData.pages.length - 2; 
            renderSidebar(); 
            renderCanvas(); 
            closePropertyPanel(); 
        }

        function duplicatePage(index, event) {
            event.stopPropagation();
            const pageToCopy = appData.pages[index];
            if (pageToCopy.type !== 'plan') return;
            
            const newPage = JSON.parse(JSON.stringify(pageToCopy));
            newPage.id = generateId();
            newPage.title = (newPage.title || 'Page') + ' (Copy)';
            if(newPage.items) {
                newPage.items.forEach(item => { item.id = generateId(); });
            }
            
            appData.pages.splice(index + 1, 0, newPage);
            currentPageIndex = index + 1;
            renderSidebar();
            renderCanvas();
            closePropertyPanel();
        }
        
        function deletePage(index, event) { 
            event.stopPropagation(); 
            const page = appData.pages[index];
            if(page.type === 'cover' || page.type === 'backcover') return;
            if(appData.pages.length <= 3) return;
            if(confirm("Delete this page?")) { 
                appData.pages.splice(index, 1); 
                if(currentPageIndex >= appData.pages.length) currentPageIndex = appData.pages.length - 1; 
                renderSidebar(); renderCanvas(); closePropertyPanel(); 
            } 
        }

        function updateCoverField(field, val) { appData[field] = val; }
        function updatePageTitle(val) { getCurrentPage().title = val; renderSidebar(); }
        function uploadBgImage(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { getCurrentPage().bgImage = e.target.result; renderCanvas(); }; reader.readAsDataURL(file); }

        function setupPasteListener() {
            document.addEventListener('paste', (e) => {
                if (mode !== 'edit') return;
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                let imageFile = null;
                for (let item of items) { if (item.type.indexOf('image') === 0) { imageFile = item.getAsFile(); break; } }
                if (!imageFile) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Data = event.target.result;
                    if (selectedItemId) { const item = getCurrentPage().items.find(i => i.id === selectedItemId); if (item) { if (!item.images) item.images = []; item.images.push(base64Data); renderPropertyPanel(); } } 
                    else { const page = getCurrentPage(); if (page.type === 'plan') { page.bgImage = base64Data; renderCanvas(); } }
                };
                reader.readAsDataURL(imageFile);
            });
        }

        function setAddModeState(isActive) {
            addMode = isActive;
            const svg = document.querySelector('#addPinBtn svg');
            if(isActive) {
                svg.classList.add('rotate-45');
                document.getElementById('canvasContent').style.cursor = 'crosshair'; 
            } else {
                svg.classList.remove('rotate-45');
                document.getElementById('canvasContent').style.cursor = 'default';
            }
        }

        function startAddingPin() {
            if(!getCurrentPage().bgImage) return;
            if(addMode) { setAddModeState(false); } 
            else { setAddModeState(true); closePropertyPanel(); }
        }

        /* ----- 优化后的展示模式全流程快捷键方案 ----- */
        document.addEventListener('keydown', (e) => {
            const targetTag = e.target.tagName;
            const isInputFocused = (targetTag === 'INPUT' || targetTag === 'TEXTAREA' || targetTag === 'SELECT');

            // 全局/编辑模式快捷键
            if (e.metaKey || e.ctrlKey) {
                if (e.key === 'p' || e.key === 'P') { e.preventDefault(); toggleMode(); return; }
                if (e.key === 's' || e.key === 'S') { e.preventDefault(); exportData(); return; }
                if (e.key === 'n' || e.key === 'N') { e.preventDefault(); newProject(); return; }
                if (e.key === 't' || e.key === 'T') { e.preventDefault(); showTableModal(); return; }
                if ((e.key === 'c' || e.key === 'C') && e.shiftKey) { e.preventDefault(); openCompressModal(); return; }
            }

            if (addMode && e.key === 'Escape') { setAddModeState(false); return; }

            // 状态判断
            const isLightboxOpen = !document.getElementById('lightbox').classList.contains('hidden');
            const isDetailOpen = !document.getElementById('playDetailModal').classList.contains('hidden');
            const isTableOpen = !document.getElementById('tableModal').classList.contains('hidden');
            const isCompressOpen = !document.getElementById('compressModal').classList.contains('hidden');

            if (mode === 'play' && !isInputFocused) {
                const key = e.key.toLowerCase(); // 统一转为小写便于判断 (比如F或f)

                if (isLightboxOpen) {
                    // 全屏灯箱模式下
                    if (e.key === 'ArrowRight') { e.preventDefault(); nextLightboxImage(); }
                    else if (e.key === 'ArrowLeft') { e.preventDefault(); prevLightboxImage(); }
                    else if (e.key === 'Escape' || e.key === 'Enter' || key === 'f') { 
                        e.preventDefault(); 
                        closeLightbox(); 
                    }
                } 
                else if (isDetailOpen) {
                    // 详情面板模式下
                    if (e.key === 'Escape') { e.preventDefault(); closePlayDetail(); }
                    else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        justClosedLightbox = false; // 用户移动焦点，说明不想连贯退出
                        if(currentDetailItem && currentDetailItem.images && currentDetailItem.images.length > 0) {
                            playFocusedImageIndex = (playFocusedImageIndex + 1) % currentDetailItem.images.length;
                            updateDetailThumbnailFocus();
                        }
                    }
                    else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        justClosedLightbox = false; // 用户移动焦点，说明不想连贯退出
                        if(currentDetailItem && currentDetailItem.images && currentDetailItem.images.length > 0) {
                            playFocusedImageIndex = (playFocusedImageIndex - 1 + currentDetailItem.images.length) % currentDetailItem.images.length;
                            updateDetailThumbnailFocus();
                        }
                    }
                    else if (e.key === 'Enter' || key === 'f') {
                        e.preventDefault();
                        if (justClosedLightbox) {
                            // 智能连贯退出逻辑：如果刚刚退出了全屏，再次按Enter/F则关闭详情面板
                            justClosedLightbox = false;
                            closePlayDetail();
                        } else if(currentDetailItem && currentDetailItem.images && currentDetailItem.images.length > 0) {
                            // 否则打开选中的图片进入全屏
                            openLightbox(playFocusedImageIndex, currentDetailItem.id);
                        } else {
                            // 该点位没图片，说明按Enter/F只能是想退出详情面板
                            closePlayDetail();
                        }
                    }
                } 
                else if (isTableOpen) {
                    // 清单已打开：按 Esc, S 或 L 都可以关闭清单
                    if (e.key === 'Escape' || key === 's' || key === 'l') { 
                        e.preventDefault(); 
                        closeTableModal(); 
                    }
                }
                else if (isCompressOpen) {
                    if (e.key === 'Escape') { e.preventDefault(); closeCompressModal(); }
                }
                else {
                    // 主画布导航逻辑
                    const page = getCurrentPage();
                    if (e.key === 'Tab') {
                        e.preventDefault(); // 阻止浏览器默认的系统焦点切换
                        if (page.type === 'plan' && page.items && page.items.length > 0) {
                            const items = page.items;
                            let currentIndex = items.findIndex(i => i.id === playFocusedPinId);
                            if (e.shiftKey) {
                                currentIndex = currentIndex <= 0 ? items.length - 1 : currentIndex - 1;
                            } else {
                                currentIndex = (currentIndex + 1) % items.length;
                            }
                            playFocusedPinId = items[currentIndex].id;
                            renderPins();
                        }
                    }
                    else if (e.key === 'Enter' || key === 'f') {
                        e.preventDefault();
                        if (page.type === 'plan' && playFocusedPinId) {
                            const item = page.items.find(i => i.id === playFocusedPinId);
                            if (item) openPlayDetail(item);
                        }
                    }
                    else if (e.key === 'Escape') {
                        e.preventDefault(); toggleMode();
                    }
                    // 一键开关部件清单快捷键（S/L）
                    else if (key === 's' || key === 'l') {
                        e.preventDefault();
                        if (page.type === 'plan' || page.type === 'backcover') {
                            showTableModal();
                        }
                    }
                    // 页面切换快捷键保持不变 (如果不需要冲突的话)
                    else if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
                        e.preventDefault();
                        if (currentPageIndex < appData.pages.length - 1) switchPage(currentPageIndex + 1);
                    }
                    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                        e.preventDefault();
                        if (currentPageIndex > 0) switchPage(currentPageIndex - 1);
                    }
                }
            } 
            // 在Edit模式下只提供弹窗退出
            else {
                if(isTableOpen && e.key === 'Escape') closeTableModal();
                if(isCompressOpen && e.key === 'Escape') closeCompressModal();
            }
        });

        function handleCanvasClick(event) {
            if (addMode) {
                const rect = event.currentTarget.getBoundingClientRect();
                const newItem = { id: generateId(), x: ((event.clientX - rect.left) / rect.width) * 100, y: ((event.clientY - rect.top) / rect.height) * 100, color: colorPalette[0], desc: '', images: [] };
                getCurrentPage().items.push(newItem);
                setAddModeState(false);
                selectPin(newItem.id);
            } else if (mode === 'edit' && event.target.id === 'pinsLayer') closePropertyPanel();
        }

        function selectPin(id) { selectedItemId = id; renderPins(); renderPropertyPanel(); }
        function startDragPin(e, id) { if(mode !== 'edit' || addMode) return; isDragging = true; dragItem = getCurrentPage().items.find(i => i.id === id); selectPin(id); }
        function dragPin(e) {
            if (!isDragging || !dragItem) return;
            const rect = document.getElementById('pinsLayer').getBoundingClientRect();
            dragItem.x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100)); dragItem.y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
            const pinEl = document.querySelector(`.pin[data-id="${dragItem.id}"]`); if(pinEl) { pinEl.style.left = `${dragItem.x}%`; pinEl.style.top = `${dragItem.y}%`; }
        }
        function stopDragPin() { isDragging = false; dragItem = null; }

        function updateItemField(field, value) { const item = getCurrentPage().items.find(i => i.id === selectedItemId); if (item) { item[field] = value; if(field === 'color') {renderPins(); renderPropertyPanel();} } }
        function uploadItemImages(event) { const files = event.target.files; if (!files.length) return; const item = getCurrentPage().items.find(i => i.id === selectedItemId); if(!item.images) item.images = []; Promise.all(Array.from(files).map(file => new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); }))).then(results => { item.images.push(...results); renderPropertyPanel(); }); }
        function deleteItemImage(index) { const item = getCurrentPage().items.find(i => i.id === selectedItemId); if (item && item.images) { item.images.splice(index, 1); renderPropertyPanel(); } }
        function duplicatePin() { const item = getCurrentPage().items.find(i => i.id === selectedItemId); if (item) { const newItem = JSON.parse(JSON.stringify(item)); newItem.id = generateId(); newItem.x += 3; newItem.y += 3; getCurrentPage().items.push(newItem); selectPin(newItem.id); } }
        function deleteSelectedPin() { getCurrentPage().items = getCurrentPage().items.filter(i => i.id !== selectedItemId); closePropertyPanel(); }
        
        // 全局同步属性
        function syncSimilarItems() {
            const sourceItem = getCurrentPage().items.find(i => i.id === selectedItemId);
            if (!sourceItem || !sourceItem.desc || !sourceItem.desc.trim()) return; 
            
            appData.pages.forEach(page => {
                if(page.items) {
                    page.items.forEach(target => {
                        if (target.id !== sourceItem.id && target.desc === sourceItem.desc) { 
                            target.color = sourceItem.color; 
                            target.dimensions = sourceItem.dimensions; 
                            target.material = sourceItem.material; 
                            target.price = sourceItem.price; 
                            target.brand = sourceItem.brand; 
                            target.note = sourceItem.note; 
                            target.images = sourceItem.images ? [...sourceItem.images] : []; 
                        }
                    });
                }
            });
            renderPins();
        }

        function toggleMode() {
            mode = mode === 'edit' ? 'play' : 'edit';
            const topbar = document.getElementById('topbar'), sidebar = document.getElementById('sidebar'), playSidebar = document.getElementById('playSidebar'), toolbar = document.getElementById('canvasToolbar'), exitBtn = document.getElementById('exitPlayBtn'), titleInput = document.getElementById('pageTitleInput');
            
            if (mode === 'play') {
                closePropertyPanel(); setAddModeState(false);
                topbar.classList.add('hidden'); sidebar.classList.add('hidden'); toolbar.style.display = 'none'; exitBtn.classList.remove('hidden'); 
                playSidebar.classList.remove('hidden'); titleInput.disabled = true;

                // 请求浏览器全屏
                const elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen().catch(err => console.warn(err)); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // Safari
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } // IE11
            } else {
                topbar.classList.remove('hidden'); sidebar.classList.remove('hidden'); exitBtn.classList.add('hidden'); playSidebar.classList.add('hidden'); titleInput.disabled = false;
                playFocusedPinId = null;

                // 退出浏览器全屏
                if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                    if (document.exitFullscreen) { document.exitFullscreen().catch(err => console.warn(err)); }
                    else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                    else if (document.msExitFullscreen) { document.msExitFullscreen(); }
                }
            }
            renderCanvas();
        }

        function openPlayDetail(item) {
            currentDetailItem = item;
            playFocusedImageIndex = 0; // 重置选中第一张图
            justClosedLightbox = false; // 重置连贯退出的标志
            
            const modal = document.getElementById('playDetailModal'), content = document.getElementById('playDetailContent'), t = i18n[currentLang];
            let imagesHTML = '';
            if (item.images && item.images.length > 0) { 
                imagesHTML = `<div class="w-2/5 bg-gray-100 flex flex-col p-2"><div class="flex-1 overflow-y-auto hide-scroll grid grid-cols-1 gap-2" id="detailImageGallery">` +
                    item.images.map((img, idx) => `<div id="thumb-${idx}" class="relative pt-[80%] cursor-zoom-in rounded overflow-hidden shadow-sm hover:shadow-md transition-all duration-200" onclick="openLightbox(${idx}, '${item.id}')"><img src="${img}" class="absolute inset-0 w-full h-full object-cover transform hover:scale-105 transition-transform duration-500"></div>`).join('') +
                    `</div></div>`; 
            }
            content.innerHTML = `
                ${imagesHTML}
                <div class="${item.images && item.images.length > 0 ? 'w-3/5' : 'w-full'} p-10 flex flex-col relative bg-white">
                    <div class="flex items-center gap-4 mb-8"><div class="w-6 h-6 rounded-full shadow-inner" style="background-color: ${item.color || '#000'}"></div><h2 class="text-3xl font-bold text-gray-900">${item.desc || '—'}</h2></div>
                    <div class="grid grid-cols-2 gap-x-8 gap-y-6">
                        <div><p class="text-xs text-gray-400 uppercase tracking-widest mb-1">${t.size}</p><p class="text-lg font-medium">${item.dimensions || '—'}</p></div>
                        <div><p class="text-xs text-gray-400 uppercase tracking-widest mb-1">${t.mat}</p><p class="text-lg font-medium">${item.material || '—'}</p></div>
                        <div><p class="text-xs text-gray-400 uppercase tracking-widest mb-1">${t.price}</p><p class="text-lg font-medium text-red-600">${item.price || '—'}</p></div>
                        <div><p class="text-xs text-gray-400 uppercase tracking-widest mb-1">${t.brand}</p><p class="text-lg font-medium">${item.brand || '—'}</p></div>
                        <div class="col-span-2"><p class="text-xs text-gray-400 uppercase tracking-widest mb-1">${t.note}</p><p class="text-md text-gray-600 bg-gray-50 p-4 rounded">${item.note ? item.note.replace(/\n/g, '<br>') : '—'}</p></div>
                    </div>
                    <button id="detailCloseBtn" onclick="closePlayDetail(event)" class="absolute top-6 right-6 text-gray-400 hover:text-gray-900 transition bg-gray-100 rounded-full p-2" title="Esc"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            `;
            modal.classList.remove('hidden'); 
            requestAnimationFrame(() => { 
                modal.classList.remove('opacity-0'); 
                content.classList.remove('scale-95'); 
                if(item.images && item.images.length > 0) updateDetailThumbnailFocus(); // 初始化焦点
            });
        }

        // 更新详情页中缩略图的高亮焦点
        function updateDetailThumbnailFocus() {
            const gallery = document.getElementById('detailImageGallery');
            if(!gallery) return;
            const thumbs = gallery.querySelectorAll('div[id^="thumb-"]');
            thumbs.forEach((el, idx) => {
                if (idx === playFocusedImageIndex) {
                    el.classList.add('thumb-focus');
                    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    el.classList.remove('thumb-focus');
                }
            });
        }

        function closePlayDetail(e) { 
            if(e) e.stopPropagation(); 
            const modal = document.getElementById('playDetailModal'), content = document.getElementById('playDetailContent'); 
            modal.classList.add('opacity-0'); content.classList.add('scale-95'); 
            setTimeout(() => { modal.classList.add('hidden'); currentDetailItem = null; }, 300); 
        }

        function openLightbox(index, itemId) { const item = getCurrentPage().items.find(i => i.id === itemId); if(!item || !item.images || item.images.length === 0) return; currentLightboxImages = item.images; currentLightboxIndex = index; updateLightboxView(); const lb = document.getElementById('lightbox'); lb.classList.remove('hidden'); requestAnimationFrame(() => lb.classList.remove('opacity-0')); }
        function updateLightboxView() { const imgEl = document.getElementById('lightboxImg'), indEl = document.getElementById('lightboxIndicator'); imgEl.style.opacity = '0'; setTimeout(() => { imgEl.src = currentLightboxImages[currentLightboxIndex]; indEl.innerText = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`; imgEl.style.opacity = '1'; }, 150); }
        function nextLightboxImage() { if(currentLightboxImages.length>1) { currentLightboxIndex = (currentLightboxIndex+1)%currentLightboxImages.length; updateLightboxView(); } }
        function prevLightboxImage() { if(currentLightboxImages.length>1) { currentLightboxIndex = (currentLightboxIndex-1+currentLightboxImages.length)%currentLightboxImages.length; updateLightboxView(); } }
        function closeLightbox() { 
            const lb = document.getElementById('lightbox'); 
            lb.classList.add('opacity-0'); 
            setTimeout(() => { 
                lb.classList.add('hidden'); 
                currentLightboxImages = []; 
            }, 300); 
            // 重要：标记是从全屏退出的，为接下来一键退出详情面板做准备
            justClosedLightbox = true; 
        }

        function showTableModal() {
            const page = getCurrentPage(); 
            let itemsToSummarize = [];
            
            if(page.type === 'backcover') {
                document.getElementById('tableNameDisplay').innerText = i18n[currentLang].totalList;
                appData.pages.forEach(p => {
                    if(p.items) itemsToSummarize = itemsToSummarize.concat(p.items);
                });
            } else {
                document.getElementById('tableNameDisplay').innerText = page.title || '';
                itemsToSummarize = page.items || [];
            }

            const groups = {};
            itemsToSummarize.forEach(item => {
                const key = item.desc ? item.desc.trim() : item.id;
                if(!groups[key]) groups[key] = { ...item, count: 1 }; else groups[key].count++;
            });

            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            let totalOverallCount = 0, totalOverallPrice = 0;

            Object.values(groups).forEach(g => {
                const qty = g.count; totalOverallCount += qty;
                let unitPrice = 0; if (g.price) { const numMatch = String(g.price).match(/[\d.]+/); if (numMatch) unitPrice = parseFloat(numMatch[0]); }
                totalOverallPrice += (unitPrice * qty);

                const thumb = (g.images && g.images.length > 0) ? `<img src="${g.images[0]}" class="w-10 h-10 object-cover rounded shadow-sm border border-gray-200 mx-auto">` : '-';
                const tr = document.createElement('tr'); tr.className = "border-b border-gray-100 hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="py-4 px-2 text-center align-middle">${thumb}</td>
                    <td class="py-4 px-2 text-center align-middle"><div class="w-4 h-4 rounded-full mx-auto shadow-inner" style="background-color: ${g.color || '#000'}"></div></td>
                    <td class="py-4 px-2 text-center align-middle">${g.desc || '-'}</td>
                    <td class="py-4 px-2 text-center align-middle">${g.dimensions || '-'}</td>
                    <td class="py-4 px-2 text-center align-middle">${g.material || '-'}</td>
                    <td class="py-4 px-2 text-center align-middle">${g.brand || '-'}</td>
                    <td class="py-4 px-2 text-center align-middle text-red-600">${g.price || '-'}</td>
                    <td class="py-4 px-2 text-center align-middle text-gray-500 text-xs">${g.note || '-'}</td>
                    <td class="py-4 px-2 text-center align-middle font-bold text-base">${g.count}</td>
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById('totalCountDisplay').innerText = totalOverallCount;
            document.getElementById('totalPriceDisplay').innerText = totalOverallPrice > 0 ? (Math.round(totalOverallPrice * 100) / 100).toString() : '-';

            const modal = document.getElementById('tableModal'), content = modal.querySelector('div');
            modal.classList.remove('hidden'); requestAnimationFrame(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); });
        }
        
        function closeTableModal(e) { if(e && e.target.closest('.bg-white') && e.target !== e.currentTarget) return; const modal = document.getElementById('tableModal'), content = modal.querySelector('div'); modal.classList.add('opacity-0'); content.classList.add('scale-95'); setTimeout(() => modal.classList.add('hidden'), 300); }

        /* 图片压缩功能 */
        function openCompressModal() {
            const modal = document.getElementById('compressModal'), content = modal.querySelector('div');
            modal.classList.remove('hidden'); requestAnimationFrame(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); });
        }
        function closeCompressModal(e) { 
            if(e && e.target.closest('.bg-white') && e.target !== e.currentTarget) return; 
            const modal = document.getElementById('compressModal'), content = modal.querySelector('div'); 
            modal.classList.add('opacity-0'); content.classList.add('scale-95'); 
            setTimeout(() => modal.classList.add('hidden'), 300); 
        }

        function compressBase64(base64, maxDim, quality) {
            return new Promise((resolve) => {
                if(!base64 || !base64.startsWith('data:image')) { resolve(base64); return; }
                let img = new Image();
                img.onload = () => {
                    let w = img.width, h = img.height;
                    if(w > maxDim || h > maxDim) {
                        if(w > h) { h = Math.round(h * (maxDim/w)); w = maxDim; }
                        else { w = Math.round(w * (maxDim/h)); h = maxDim; }
                        let cvs = document.createElement('canvas');
                        cvs.width = w; cvs.height = h;
                        let ctx = cvs.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(cvs.toDataURL('image/jpeg', quality));
                    } else {
                        resolve(base64); 
                    }
                };
                img.onerror = () => resolve(base64);
                img.src = base64;
            });
        }

        async function executeCompression() {
            const maxDim = parseInt(document.querySelector('input[name="compRes"]:checked').value);
            const quality = 0.85;
            const btn = document.getElementById('btnExecuteCompress');
            const origText = btn.innerHTML;
            
            btn.innerHTML = `<svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;
            btn.disabled = true;

            let compressedCount = 0;
            for (let p of appData.pages) {
                if (p.bgImage) {
                    const oldLen = p.bgImage.length;
                    p.bgImage = await compressBase64(p.bgImage, maxDim, quality);
                    if(p.bgImage.length < oldLen) compressedCount++;
                }
                if (p.items) {
                    for (let i of p.items) {
                        if (i.images) {
                            for (let j = 0; j < i.images.length; j++) {
                                const oldLen = i.images[j].length;
                                i.images[j] = await compressBase64(i.images[j], maxDim, quality);
                                if(i.images[j].length < oldLen) compressedCount++;
                            }
                        }
                    }
                }
            }
            
            btn.innerHTML = origText;
            btn.disabled = false;
            closeCompressModal();
            alert(`${i18n[currentLang].compressDone} ${compressedCount}`);
            
            if (selectedItemId) renderPropertyPanel();
            renderCanvas();
        }

        function exportData() {
            try {
                const dataStr = JSON.stringify(appData), blob = new Blob([dataStr], { type: "application/json" }), url = URL.createObjectURL(blob), linkElement = document.createElement('a');
                linkElement.href = url; linkElement.download = `Pieces_${appData.projectName || '项目'}_${new Date().toLocaleDateString().replace(/\//g, '')}.json`;
                document.body.appendChild(linkElement); linkElement.click(); document.body.removeChild(linkElement); URL.revokeObjectURL(url);
            } catch (error) { alert("导出失败，可能是因为插入的图片过大导致内存溢出。建议使用上方的“压缩”功能处理后再试。"); console.error(error); }
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if(parsedData && parsedData.pages) {
                        appData = parsedData; currentPageIndex = 0; selectedItemId = null;
                        
                        // 兼容旧版本：补充封面
                        if(appData.pages[0].type !== 'cover') {
                            appData.pages.unshift({ id: generateId(), type: 'cover', title: '' });
                        }
                        // 兼容旧版本：补充封底
                        if(appData.pages[appData.pages.length - 1].type !== 'backcover') {
                            appData.pages.push({ id: generateId(), type: 'backcover', title: '' });
                        }
                        if(!appData.backcoverTitle) appData.backcoverTitle = 'THANKS';

                        document.getElementById('coverProjectName').value = appData.projectName || ''; 
                        document.getElementById('coverAuthor').value = appData.author || ''; 
                        document.getElementById('coverDate').value = appData.date || '';
                        
                        renderSidebar(); renderCanvas(); closePropertyPanel();
                    } else { alert("文件格式不正确！"); }
                } catch(error) { alert("读取文件失败：" + error); }
                event.target.value = '';
            }
            reader.readAsText(file);
        }

        function hexToRgba(hex, alpha) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); if (alpha) return `rgba(${r}, ${g}, ${b}, ${alpha})`; return `rgb(${r}, ${g}, ${b})`; }
    </script>
